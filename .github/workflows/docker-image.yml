name: Build and push image (private registry)

on:
  push:
    branches:
      - main
      - dev

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    env:
      REGISTRY: docker.ktovoz.com
      NAMESPACE: ${{ secrets.PRIVATE_REGISTRY_NAMESPACE || 'ktovoz' }}
      IMAGE_NAME: ${{ github.event.repository.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase image name
        id: image
        run: echo "name=$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to private registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.PRIVATE_REGISTRY_USERNAME }}
          password: ${{ secrets.PRIVATE_REGISTRY_PASSWORD }}

      - name: Get version tag
        id: version
        run: echo "VERSION=$(date +%Y%m%d)-${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Set image tags
        id: tags
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/dev" ]]; then
            echo "private_tags=${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ steps.image.outputs.name }}:dev,${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ steps.image.outputs.name }}:dev-${{ steps.version.outputs.VERSION }}" >> $GITHUB_OUTPUT
          else
            echo "private_tags=${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ steps.image.outputs.name }}:prod,${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ steps.image.outputs.name }}:prod-${{ steps.version.outputs.VERSION }}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.private_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false
