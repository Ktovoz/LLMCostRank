<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0; url=https://www.llmcostrank.com">
    <title>Redirecting...</title>
    <script>
        // 获取当前路径和查询参数，保持跳转
        var newUrl = 'https://www.llmcostrank.com' + window.location.pathname + window.location.search;
        window.location.replace(newUrl);
    </script>
</head>
<body>
    <p>正在跳转到 <a href="https://www.llmcostrank.com">www.llmcostrank.com</a>...</p>
</body>
</html>
